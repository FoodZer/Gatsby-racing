<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Great Gatsby Race</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --gold: #D4AF37;
    --gold-light: #F5D76E;
    --gold-dark: #A8860C;
    --cream: #F8F0DC;
    --black: #0A0806;
    --dark: #1A1208;
    --green: #1B4332;
    --road-dark: #2C2C2C;
    --road-light: #3A3A3A;
    --sky-top: #0D1B2A;
    --sky-bottom: #1B3A5C;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    color: var(--cream);
    width: 100vw;
    height: 100vh;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  #gameContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #gameCanvas {
    width: 100%;
    height: 100%;
  }

  /* ===== SCREENS ===== */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s ease;
  }

  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ===== START SCREEN ===== */
  #startScreen {
    background: radial-gradient(ellipse at 50% 30%, #1B3A5C 0%, #0A0806 70%);
    overflow: hidden;
  }

  #startScreen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(212,175,55,0.15) 0%, transparent 60%),
      repeating-linear-gradient(90deg, transparent, transparent 98px, rgba(212,175,55,0.03) 98px, rgba(212,175,55,0.03) 100px),
      repeating-linear-gradient(0deg, transparent, transparent 98px, rgba(212,175,55,0.03) 98px, rgba(212,175,55,0.03) 100px);
    pointer-events: none;
  }

  .art-deco-frame {
    position: relative;
    padding: 50px 70px;
    text-align: center;
    max-width: 700px;
  }

  .art-deco-frame::before, .art-deco-frame::after {
    content: '';
    position: absolute;
    border: 2px solid var(--gold);
  }
  .art-deco-frame::before { inset: 0; }
  .art-deco-frame::after { inset: 8px; border-color: rgba(212,175,55,0.4); }

  .corner-ornament {
    position: absolute;
    width: 40px; height: 40px;
    border-color: var(--gold-light);
    border-style: solid;
  }
  .corner-ornament.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
  .corner-ornament.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
  .corner-ornament.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; }
  .corner-ornament.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

  .game-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .game-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(42px, 7vw, 76px);
    line-height: 1;
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(212,175,55,0.5), 0 2px 0 var(--gold-dark);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .game-subtitle {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(20px, 3vw, 32px);
    color: var(--cream);
    opacity: 0.85;
    margin-bottom: 30px;
    letter-spacing: 3px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 16px 0 28px;
    color: var(--gold);
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }
  .divider-diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .game-quote {
    font-style: italic;
    font-size: 13px;
    color: rgba(248,240,220,0.6);
    margin-bottom: 36px;
    line-height: 1.6;
    max-width: 420px;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--black);
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    border: none;
    padding: 16px 52px;
    cursor: pointer;
    position: relative;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    transition: all 0.3s ease;
    font-weight: 700;
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, #fff7d6, var(--gold-light), var(--gold));
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(212,175,55,0.4);
  }

  .controls-hint {
    margin-top: 28px;
    font-size: 12px;
    letter-spacing: 3px;
    color: rgba(212,175,55,0.5);
    text-transform: uppercase;
  }

  .controls-hint span {
    display: inline-block;
    background: rgba(212,175,55,0.15);
    border: 1px solid rgba(212,175,55,0.3);
    padding: 3px 8px;
    border-radius: 3px;
    margin: 0 3px;
    color: var(--gold);
  }

  /* Stars */
  .stars-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--min); transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ===== HUD ===== */
  #hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .hud-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  }

  .hud-box {
    background: rgba(10,8,6,0.7);
    border: 1px solid rgba(212,175,55,0.4);
    padding: 8px 18px;
    text-align: center;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .hud-label {
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(212,175,55,0.6);
    margin-bottom: 2px;
  }

  .hud-value {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
  }

  .lap-indicator {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 4px;
    text-align: center;
  }

  /* Speedometer */
  .speedometer {
    position: absolute;
    bottom: 20px;
    right: 24px;
    width: 120px;
    height: 120px;
  }

  /* Mini map */
  #minimap {
    position: absolute;
    bottom: 20px;
    left: 24px;
    width: 120px;
    height: 120px;
    border: 1px solid rgba(212,175,55,0.4);
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    overflow: hidden;
  }

  /* Position indicator */
  .position-badge {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--gold);
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(212,175,55,0.3);
    padding: 4px 16px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  /* ===== END SCREEN ===== */
  #endScreen {
    background: radial-gradient(ellipse at 50% 50%, #1a1208 0%, #0A0806 80%);
  }

  #endScreen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(212,175,55,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .end-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(212,175,55,0.4);
    margin-bottom: 8px;
    letter-spacing: 3px;
  }

  .end-stats {
    display: flex;
    gap: 32px;
    margin: 28px 0;
  }

  .stat-box {
    text-align: center;
    padding: 16px 28px;
    border: 1px solid rgba(212,175,55,0.3);
    background: rgba(212,175,55,0.05);
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(212,175,55,0.6);
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold-light);
  }

  /* Countdown overlay */
  #countdown {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 100;
  }

  .countdown-num {
    font-family: 'Playfair Display', serif;
    font-size: 180px;
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 60px rgba(212,175,55,0.8);
    opacity: 0;
    transform: scale(2);
    transition: none;
  }

  @keyframes countPop {
    0% { opacity: 0; transform: scale(2); }
    20% { opacity: 1; transform: scale(1); }
    70% { opacity: 1; transform: scale(0.95); }
    100% { opacity: 0; transform: scale(0.5); }
  }

  .count-pop { animation: countPop 0.9s ease-out forwards; }

  /* Collision flash */
  #collisionFlash {
    position: absolute;
    inset: 0;
    background: rgba(220, 50, 50, 0.4);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.05s;
    z-index: 50;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <!-- START SCREEN -->
  <div class="screen" id="startScreen">
    <div class="stars-bg" id="starsContainer"></div>
    <div class="art-deco-frame">
      <div class="corner-ornament tl"></div>
      <div class="corner-ornament tr"></div>
      <div class="corner-ornament bl"></div>
      <div class="corner-ornament br"></div>
      <div class="game-eyebrow">West Egg Championship · 1922</div>
      <div class="game-title">The Great</div>
      <div class="game-subtitle">Gatsby Race</div>
      <div class="divider"><div class="divider-diamond"></div></div>
      <div class="game-quote">
        "So we beat on, boats against the current,<br>borne back ceaselessly into the past."
      </div>
      <button class="btn-primary" id="startBtn">Race Now</button>
      <div class="controls-hint">
        <span>↑</span> Accelerate &nbsp;
        <span>↓</span> Brake &nbsp;
        <span>←</span><span>→</span> Steer
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-top">
      <div class="hud-box">
        <div class="hud-label">Speed</div>
        <div class="hud-value" id="speedDisplay">0</div>
      </div>
      <div style="text-align:center">
        <div class="hud-label" style="text-align:center;font-size:9px;letter-spacing:4px;color:rgba(212,175,55,0.5);margin-bottom:4px">LAP</div>
        <div id="lapDisplay" style="font-family:'Playfair Display',serif;font-size:20px;color:var(--gold)">1 / 3</div>
      </div>
      <div class="hud-box">
        <div class="hud-label">Time</div>
        <div class="hud-value" id="timeDisplay">0:00</div>
      </div>
    </div>
    <div class="position-badge" id="posDisplay">P1</div>
    <canvas id="minimapCanvas" style="position:absolute;bottom:20px;left:24px;width:120px;height:120px;border:1px solid rgba(212,175,55,0.4);border-radius:50%;background:rgba(0,0,0,0.5)"></canvas>
    <canvas id="speedoCanvas" class="speedometer"></canvas>
  </div>

  <!-- COUNTDOWN -->
  <div id="countdown">
    <div class="countdown-num" id="countdownNum">3</div>
  </div>

  <!-- COLLISION FLASH -->
  <div id="collisionFlash"></div>

  <!-- END SCREEN -->
  <div class="screen hidden" id="endScreen">
    <div class="art-deco-frame">
      <div class="corner-ornament tl"></div>
      <div class="corner-ornament tr"></div>
      <div class="corner-ornament bl"></div>
      <div class="corner-ornament br"></div>
      <div class="game-eyebrow" id="endEyebrow">Race Complete</div>
      <div class="end-title" id="endTitle">Magnificent!</div>
      <div class="divider"><div class="divider-diamond"></div></div>
      <div class="end-stats">
        <div class="stat-box">
          <div class="stat-label">Final Time</div>
          <div class="stat-value" id="finalTime">0:00</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Position</div>
          <div class="stat-value" id="finalPos">1st</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Top Speed</div>
          <div class="stat-value" id="finalSpeed">0</div>
        </div>
      </div>
      <button class="btn-primary" id="restartBtn">Race Again</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  THE GREAT GATSBY RACE — Pseudo-3D Racing Engine
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimapCanvas');
const mmCtx = minimapCanvas.getContext('2d');
const speedoCanvas = document.getElementById('speedoCanvas');
const spCtx = speedoCanvas.getContext('2d');

// ---- Stars Background ----
(function buildStars() {
  const container = document.getElementById('starsContainer');
  for (let i = 0; i < 140; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    const minOp = (Math.random() * 0.3 + 0.1).toFixed(2);
    const dur = (Math.random() * 3 + 1.5).toFixed(1);
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--min:${minOp};--d:${dur}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
    container.appendChild(s);
  }
})();

// ---- Resize ----
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  minimapCanvas.width = 120;
  minimapCanvas.height = 120;
  speedoCanvas.width = 120;
  speedoCanvas.height = 120;
}
resize();
window.addEventListener('resize', resize);

// ============================================================
//  TRACK DEFINITION
//  Each segment: { curve, hill, color }
//  curve: turn rate (-1 to 1)
//  Segments loop for N laps
// ============================================================
const SEGMENT_LENGTH = 200;
const ROAD_WIDTH = 2000;
const DRAW_DISTANCE = 300;
const TOTAL_LAPS = 3;
const FIELD_OF_VIEW = 100;
const CAMERA_HEIGHT = 1000;
const CAMERA_DEPTH = 1 / Math.tan((FIELD_OF_VIEW / 2) * Math.PI / 180);

// Build track
function buildTrack() {
  const segs = [];
  function add(count, curve, hill, type) {
    for (let i = 0; i < count; i++) {
      segs.push({ curve, hill, type: type || 'road', index: segs.length });
    }
  }
  // Straight start
  add(40, 0, 0, 'road');
  // Gentle right curve
  add(30, 0.3, 0, 'road');
  add(20, 0, 0, 'road');
  // S-curve
  add(25, -0.5, 0, 'road');
  add(20, 0, 0, 'road');
  add(25, 0.6, 0, 'road');
  // Hill up
  add(30, 0, 30, 'road');
  add(30, 0.4, -20, 'road');
  // Long straight
  add(50, 0, 0, 'road');
  // Hairpin
  add(15, 1.5, 0, 'road');
  add(15, 1.5, 0, 'road');
  add(20, 0, 0, 'road');
  // Chicane
  add(15, -0.8, 10, 'road');
  add(15, 0.8, -10, 'road');
  add(30, 0, 0, 'road');
  // Slight curve back to start
  add(20, 0.2, 0, 'road');
  add(20, 0, 0, 'road');

  // Pre-compute world positions for minimap
  let x = 0, z = 0, angle = 0;
  const trackLength = segs.length;
  for (let i = 0; i < trackLength; i++) {
    segs[i].worldX = x;
    segs[i].worldZ = z;
    angle += segs[i].curve * 0.01;
    x += Math.sin(angle) * SEGMENT_LENGTH;
    z += Math.cos(angle) * SEGMENT_LENGTH;
  }
  return segs;
}

let TRACK = buildTrack();
const TRACK_LENGTH = TRACK.length * SEGMENT_LENGTH;

// ---- Project 3D -> 2D ----
function project(seg, cameraX, cameraY, cameraZ, cameraDepth, width, height, roadWidth) {
  const transX = seg.worldX !== undefined ? 0 : 0;
  const camSegX = cameraX || 0;
  const scale = cameraDepth / (seg.z - cameraZ);
  const screenX = Math.round((1 + scale * (seg.x - camSegX)) * width / 2);
  const screenY = Math.round((1 - scale * (seg.y - cameraY)) * height / 2);
  const screenW = Math.round(scale * roadWidth * width / 2);
  return { scale, screenX, screenY, screenW };
}

// ============================================================
//  COLORS
// ============================================================
const COLORS = {
  sky: { top: '#0D1B2A', bottom: '#1B3A5C' },
  grass: ['#1B4332', '#144026'],
  road: ['#2C2C2C', '#323232'],
  rumble: ['#C8A84B', '#2C2C2C'],
  lane:   '#D4AF37',
  fog: 'rgba(13,27,42,0.6)',
};

// ============================================================
//  GAME STATE
// ============================================================
let state = 'start'; // start | countdown | racing | end
let gameTime = 0;
let lapStartTime = 0;
let bestLap = Infinity;
let currentLap = 1;
let raceStartTime = 0;
let topSpeed = 0;
let raceFinished = false;

// ---- Player ----
const player = {
  z: 0,         // position along track
  x: 0,         // lateral offset (-1 to 1 relative to road)
  speed: 0,
  maxSpeed: 180, // km/h equivalent
  accel: 0.05,
  decel: 0.04,
  braking: 0.1,
  turn: 0,
  turning: 0,
  offRoad: false,
};

// ---- Opponents ----
const OPPONENT_COLORS = ['#1a1a2e', '#16213e', '#0f3460', '#533483', '#2d4739'];
const OPPONENT_NAMES  = ['Old Sport', 'Daisy', 'Tom', 'Jordan', 'Meyer'];

function createOpponents() {
  const opponents = [];
  for (let i = 0; i < 4; i++) {
    opponents.push({
      z: (i + 1) * SEGMENT_LENGTH * -8,
      x: (i % 2 === 0 ? 0.3 : -0.3),
      speed: 0,
      maxSpeed: 120 + Math.random() * 40,
      color: OPPONENT_COLORS[i],
      name: OPPONENT_NAMES[i],
      lap: 1,
      id: i,
    });
  }
  return opponents;
}

let opponents = createOpponents();

// ---- Input ----
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup',   e => keys[e.code] = false);

// ---- Segments cache ----
function getSegment(z) {
  const idx = Math.floor(z / SEGMENT_LENGTH) % TRACK.length;
  return TRACK[(idx + TRACK.length) % TRACK.length];
}

// ============================================================
//  RENDERER
// ============================================================
function render() {
  const W = canvas.width;
  const H = canvas.height;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  skyGrad.addColorStop(0, COLORS.sky.top);
  skyGrad.addColorStop(1, COLORS.sky.bottom);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Distant city silhouette / gatsby lights
  drawCitySkyline(W, H);

  // Ground
  ctx.fillStyle = COLORS.grass[0];
  ctx.fillRect(0, H * 0.5, W, H * 0.5);

  // ---- Render road segments ----
  const playerSegIdx = Math.floor(player.z / SEGMENT_LENGTH) % TRACK.length;
  let x = 0;
  let dx = 0;
  let maxY = H;

  for (let n = 0; n < DRAW_DISTANCE; n++) {
    const segIdx = (playerSegIdx + n) % TRACK.length;
    const seg = TRACK[segIdx];
    const segZ = (Math.floor(player.z / SEGMENT_LENGTH) + n) * SEGMENT_LENGTH;

    const cameraDepth = CAMERA_DEPTH;
    const playerZ = player.z;
    const scale = cameraDepth / (segZ - playerZ + 1);
    const screenX = W / 2 + (player.x * ROAD_WIDTH / 2 + x) * scale * W / 2;
    const screenY = H / 2 - (seg.hill || 0) * scale;
    const roadW = scale * ROAD_WIDTH * W / 2;

    if (screenY >= maxY) continue;
    maxY = screenY;

    const even = Math.floor(segZ / SEGMENT_LENGTH) % 2 === 0;
    const grass = COLORS.grass[even ? 0 : 1];
    const road  = COLORS.road[even ? 0 : 1];
    const rumble = COLORS.rumble[even ? 0 : 1];

    const nextSegIdx = (segIdx + 1) % TRACK.length;
    const nextSeg = TRACK[nextSegIdx];
    const nextSegZ = segZ + SEGMENT_LENGTH;
    const nextScale = cameraDepth / (nextSegZ - playerZ + 1);
    const nextScreenX = W / 2 + (player.x * ROAD_WIDTH / 2 + x + dx * SEGMENT_LENGTH) * nextScale * W / 2;
    const nextScreenY = H / 2 - (nextSeg.hill || 0) * nextScale;
    const nextRoadW = nextScale * ROAD_WIDTH * W / 2;

    const fog = Math.min(1, n / DRAW_DISTANCE * 1.4);

    // Grass strips (full width background)
    drawTrapezoid(ctx, 0, screenY, W, 0, nextScreenY, W, grass, fog);

    // Rumble strips
    drawTrapezoid(ctx,
      screenX - roadW * 1.2, screenY, roadW * 0.2,
      nextScreenX - nextRoadW * 1.2, nextScreenY, nextRoadW * 0.2,
      rumble, fog
    );
    drawTrapezoid(ctx,
      screenX + roadW, screenY, roadW * 0.2,
      nextScreenX + nextRoadW, nextScreenY, nextRoadW * 0.2,
      rumble, fog
    );

    // Road surface
    drawTrapezoid(ctx,
      screenX - roadW, screenY, roadW * 2,
      nextScreenX - nextRoadW, nextScreenY, nextRoadW * 2,
      road, fog
    );

    // Center lane marking
    if (even) {
      drawTrapezoid(ctx,
        screenX - roadW * 0.02, screenY, roadW * 0.04,
        nextScreenX - nextRoadW * 0.02, nextScreenY, nextRoadW * 0.04,
        COLORS.lane, fog
      );
    }

    dx += seg.curve;
    x += dx;
  }

  // Reset dx for car drawing
  // Draw opponents
  drawCars(W, H);
}

function drawTrapezoid(ctx, x1, y1, w1, x2, y2, w2, color, fog) {
  if (y2 >= y1) return;
  ctx.fillStyle = blendFog(color, fog);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x1 + w1, y1);
  ctx.lineTo(x2 + w2, y2);
  ctx.lineTo(x2, y2);
  ctx.closePath();
  ctx.fill();
}

function blendFog(hexColor, t) {
  if (t <= 0) return hexColor;
  // Parse hex
  let r, g, b;
  if (hexColor.startsWith('#')) {
    const hex = hexColor.slice(1);
    if (hex.length === 3) {
      r = parseInt(hex[0]+hex[0], 16);
      g = parseInt(hex[1]+hex[1], 16);
      b = parseInt(hex[2]+hex[2], 16);
    } else {
      r = parseInt(hex.slice(0,2), 16);
      g = parseInt(hex.slice(2,4), 16);
      b = parseInt(hex.slice(4,6), 16);
    }
  } else {
    return hexColor;
  }
  const fr = 13, fg = 27, fb = 42; // fog color (sky top)
  r = Math.round(r + (fr - r) * t);
  g = Math.round(g + (fg - g) * t);
  b = Math.round(b + (fb - b) * t);
  return `rgb(${r},${g},${b})`;
}

// ---- City Skyline ----
function drawCitySkyline(W, H) {
  const horizon = H * 0.5;
  // Distant green light — Gatsby's dock
  const glowX = W * 0.72;
  const glowGrad = ctx.createRadialGradient(glowX, horizon - 30, 0, glowX, horizon - 30, 80);
  glowGrad.addColorStop(0, 'rgba(0, 220, 140, 0.35)');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(glowX, horizon - 30, 80, 0, Math.PI * 2);
  ctx.fill();

  // Buildings
  ctx.fillStyle = 'rgba(5,10,18,0.9)';
  const buildings = [
    [0.05, 0.22, 0.04, 0.12],
    [0.08, 0.18, 0.05, 0.16],
    [0.12, 0.24, 0.03, 0.10],
    [0.15, 0.19, 0.06, 0.14],
    [0.75, 0.20, 0.04, 0.13],
    [0.78, 0.17, 0.06, 0.16],
    [0.83, 0.23, 0.04, 0.11],
    [0.87, 0.19, 0.05, 0.14],
    [0.91, 0.22, 0.04, 0.12],
  ];
  buildings.forEach(([bx, bw, bh, by]) => {
    ctx.fillRect(W * bx, horizon - H * bh, W * bw, H * by);
  });

  // Window lights
  buildings.forEach(([bx, bw, bh]) => {
    for (let row = 0; row < 4; row++) {
      for (let col = 0; col < 3; col++) {
        if (Math.random() > 0.45) {
          ctx.fillStyle = 'rgba(212,175,55,0.5)';
          ctx.fillRect(
            W * bx + W * bw * 0.15 + col * W * bw * 0.25,
            horizon - H * bh * 0.9 + row * 8,
            W * bw * 0.18, 5
          );
        }
      }
    }
  });
}

// ---- Draw Cars ----
function drawCars(W, H) {
  const playerSegIdx = Math.floor(player.z / SEGMENT_LENGTH);

  // Sort opponents by distance (far first)
  const visibleOpponents = opponents.map(opp => {
    const dz = ((opp.z - player.z) % TRACK_LENGTH + TRACK_LENGTH) % TRACK_LENGTH;
    return { ...opp, dz };
  }).filter(o => o.dz < DRAW_DISTANCE * SEGMENT_LENGTH && o.dz > 0)
    .sort((a, b) => b.dz - a.dz);

  visibleOpponents.forEach(opp => {
    const segZ = player.z + opp.dz;
    const scale = CAMERA_DEPTH / (opp.dz + SEGMENT_LENGTH);
    const screenX = W / 2 + (opp.x - player.x) * ROAD_WIDTH / 2 * scale * W / 2;
    const screenY = H / 2;
    const carW = scale * ROAD_WIDTH * 0.35 * W / 2;
    const carH = carW * 0.55;
    const fog = Math.min(1, opp.dz / (DRAW_DISTANCE * SEGMENT_LENGTH) * 1.5);
    if (carW < 2) return;
    drawCar3D(ctx, screenX, screenY, carW, carH, opp.color, fog, false);
  });

  // Player car (always center bottom)
  const carW = W * 0.13;
  const carH = carW * 0.5;
  const cx = W / 2 + player.turning * W * 0.015;
  const cy = H - carH * 0.3;
  drawCar3D(ctx, cx, cy, carW, carH, '#D4AF37', 0, true);
}

function drawCar3D(ctx, cx, cy, w, h, color, fog, isPlayer) {
  const fc = blendFog(color, fog);
  const bodyH = h * 0.55;
  const cabH  = h * 0.45;
  const cabW  = w * 0.55;

  // Shadow
  ctx.fillStyle = `rgba(0,0,0,${0.3 - fog * 0.2})`;
  ctx.beginPath();
  ctx.ellipse(cx, cy + h * 0.08, w * 0.45, h * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = fc;
  ctx.beginPath();
  ctx.roundRect(cx - w/2, cy - bodyH, w, bodyH, [4, 4, 8, 8]);
  ctx.fill();

  // Cab
  const cabColor = blendFog(lightenColor(color, 15), fog);
  ctx.fillStyle = cabColor;
  ctx.beginPath();
  ctx.moveTo(cx - cabW/2 * 0.9, cy - bodyH);
  ctx.lineTo(cx - cabW/2, cy - bodyH - cabH);
  ctx.lineTo(cx + cabW/2, cy - bodyH - cabH);
  ctx.lineTo(cx + cabW/2 * 0.9, cy - bodyH);
  ctx.closePath();
  ctx.fill();

  // Windows
  ctx.fillStyle = `rgba(180,220,255,${0.5 - fog * 0.3})`;
  ctx.fillRect(cx - cabW/2 * 0.75, cy - bodyH - cabH * 0.85, cabW * 0.35, cabH * 0.55);
  ctx.fillRect(cx + cabW * 0.08, cy - bodyH - cabH * 0.85, cabW * 0.35, cabH * 0.55);

  // Headlights / taillights
  if (isPlayer) {
    // Taillights (red, facing us)
    ctx.fillStyle = 'rgba(255,80,60,0.9)';
  } else {
    // Headlights (yellow)
    ctx.fillStyle = `rgba(255,230,100,${0.8 - fog * 0.5})`;
  }
  ctx.beginPath();
  ctx.ellipse(cx - w * 0.38, cy - bodyH * 0.4, w * 0.06, h * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + w * 0.38, cy - bodyH * 0.4, w * 0.06, h * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wheels
  ctx.fillStyle = blendFog('#1a1a1a', fog);
  [[-w*0.38, bodyH * 0.05], [w*0.38, bodyH * 0.05]].forEach(([wx, wy]) => {
    ctx.beginPath();
    ctx.ellipse(cx + wx, cy + wy, w * 0.1, h * 0.14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = blendFog('#555', fog);
    ctx.beginPath();
    ctx.ellipse(cx + wx, cy + wy, w * 0.05, h * 0.07, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = blendFog('#1a1a1a', fog);
  });

  // Golden trim for player
  if (isPlayer) {
    ctx.strokeStyle = '#D4AF37';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(cx - w/2 + 2, cy - bodyH + 2, w - 4, bodyH - 4);
  }
}

function lightenColor(hex, amount) {
  if (!hex.startsWith('#')) return hex;
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amount);
  g = Math.min(255, g + amount);
  b = Math.min(255, b + amount);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ---- Minimap ----
function renderMinimap() {
  const mW = 120, mH = 120;
  mmCtx.clearRect(0, 0, mW, mH);

  // Clip to circle
  mmCtx.save();
  mmCtx.beginPath();
  mmCtx.arc(mW/2, mH/2, mW/2 - 1, 0, Math.PI * 2);
  mmCtx.clip();

  mmCtx.fillStyle = 'rgba(0,0,0,0.7)';
  mmCtx.fillRect(0, 0, mW, mH);

  // Find bounds
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  TRACK.forEach(s => {
    if (s.worldX < minX) minX = s.worldX;
    if (s.worldX > maxX) maxX = s.worldX;
    if (s.worldZ < minZ) minZ = s.worldZ;
    if (s.worldZ > maxZ) maxZ = s.worldZ;
  });
  const scaleX = (mW - 16) / (maxX - minX || 1);
  const scaleZ = (mH - 16) / (maxZ - minZ || 1);
  const sc = Math.min(scaleX, scaleZ);

  function toScreen(wx, wz) {
    return [
      8 + (wx - minX) * sc,
      8 + (wz - minZ) * sc,
    ];
  }

  // Draw track
  mmCtx.strokeStyle = 'rgba(212,175,55,0.4)';
  mmCtx.lineWidth = 3;
  mmCtx.beginPath();
  TRACK.forEach((s, i) => {
    const [sx, sz] = toScreen(s.worldX, s.worldZ);
    if (i === 0) mmCtx.moveTo(sx, sz);
    else mmCtx.lineTo(sx, sz);
  });
  const [sx0, sz0] = toScreen(TRACK[0].worldX, TRACK[0].worldZ);
  mmCtx.lineTo(sx0, sz0);
  mmCtx.stroke();

  // Player position
  const playerSegIdx = Math.floor(player.z / SEGMENT_LENGTH) % TRACK.length;
  const ps = TRACK[playerSegIdx];
  const [px, pz] = toScreen(ps.worldX, ps.worldZ);
  mmCtx.fillStyle = '#D4AF37';
  mmCtx.beginPath();
  mmCtx.arc(px, pz, 4, 0, Math.PI * 2);
  mmCtx.fill();

  // Opponents
  opponents.forEach(opp => {
    const segIdx = Math.floor(((opp.z % TRACK_LENGTH) + TRACK_LENGTH) % TRACK_LENGTH / SEGMENT_LENGTH) % TRACK.length;
    const os = TRACK[segIdx];
    const [ox, oz] = toScreen(os.worldX, os.worldZ);
    mmCtx.fillStyle = opp.color;
    mmCtx.beginPath();
    mmCtx.arc(ox, oz, 3, 0, Math.PI * 2);
    mmCtx.fill();
  });

  mmCtx.restore();

  // Border
  mmCtx.strokeStyle = 'rgba(212,175,55,0.5)';
  mmCtx.lineWidth = 1;
  mmCtx.beginPath();
  mmCtx.arc(mW/2, mH/2, mW/2 - 1, 0, Math.PI * 2);
  mmCtx.stroke();
}

// ---- Speedometer ----
function renderSpeedometer(speed, maxSpeed) {
  const W = 120, H = 120;
  spCtx.clearRect(0, 0, W, H);

  const cx = W/2, cy = H/2, r = 52;
  const startAngle = Math.PI * 0.75;
  const endAngle   = Math.PI * 2.25;
  const t = speed / maxSpeed;
  const angle = startAngle + t * (endAngle - startAngle);

  // Background arc
  spCtx.strokeStyle = 'rgba(212,175,55,0.15)';
  spCtx.lineWidth = 8;
  spCtx.lineCap = 'round';
  spCtx.beginPath();
  spCtx.arc(cx, cy, r, startAngle, endAngle);
  spCtx.stroke();

  // Speed arc
  if (t > 0) {
    const grad = spCtx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0, '#D4AF37');
    grad.addColorStop(1, '#F5D76E');
    spCtx.strokeStyle = grad;
    spCtx.lineWidth = 8;
    spCtx.beginPath();
    spCtx.arc(cx, cy, r, startAngle, angle);
    spCtx.stroke();
  }

  // Needle
  spCtx.strokeStyle = '#F5D76E';
  spCtx.lineWidth = 2;
  spCtx.lineCap = 'round';
  spCtx.beginPath();
  spCtx.moveTo(cx, cy);
  spCtx.lineTo(cx + Math.cos(angle) * r * 0.75, cy + Math.sin(angle) * r * 0.75);
  spCtx.stroke();

  // Center
  spCtx.fillStyle = '#D4AF37';
  spCtx.beginPath();
  spCtx.arc(cx, cy, 5, 0, Math.PI * 2);
  spCtx.fill();

  // Speed number
  spCtx.fillStyle = '#F5D76E';
  spCtx.font = "bold 16px 'Playfair Display', serif";
  spCtx.textAlign = 'center';
  spCtx.textBaseline = 'middle';
  spCtx.fillText(Math.floor(speed), cx, cy + 18);

  spCtx.fillStyle = 'rgba(212,175,55,0.5)';
  spCtx.font = "8px 'Cormorant Garamond', serif";
  spCtx.fillText('KM/H', cx, cy + 30);
}

// ============================================================
//  PHYSICS & UPDATE
// ============================================================
let lastTime = 0;
let collisionCooldown = 0;

function update(dt) {
  if (state === 'start' || state === 'end') return;

  gameTime += dt;

  // ---- Player Input ----
  const accelInput = keys['ArrowUp']   || keys['KeyW'];
  const brakeInput = keys['ArrowDown'] || keys['KeyS'];
  const leftInput  = keys['ArrowLeft'] || keys['KeyA'];
  const rightInput = keys['ArrowRight']|| keys['KeyD'];

  // Speed
  if (accelInput) {
    player.speed = Math.min(player.maxSpeed, player.speed + player.maxSpeed * player.accel);
  } else if (brakeInput) {
    player.speed = Math.max(0, player.speed - player.maxSpeed * player.braking);
  } else {
    player.speed = Math.max(0, player.speed - player.maxSpeed * player.decel);
  }

  // Off-road penalty
  if (Math.abs(player.x) > 1.0) {
    player.offRoad = true;
    player.speed *= 0.97;
  } else {
    player.offRoad = false;
  }

  if (player.speed > topSpeed) topSpeed = player.speed;

  // Steering
  const steerAmt = (0.002 + player.speed / player.maxSpeed * 0.004);
  if (leftInput)  { player.x -= steerAmt; player.turning = -1; }
  else if (rightInput) { player.x += steerAmt; player.turning = 1; }
  else { player.turning *= 0.8; }

  player.x = Math.max(-1.8, Math.min(1.8, player.x));

  // Track curve influence (drift)
  const seg = getSegment(player.z);
  player.x -= seg.curve * (player.speed / player.maxSpeed) * 0.003;

  // Move forward
  player.z += player.speed * dt * 60;

  // Lap tracking
  const prevLapZ = currentLap * TRACK_LENGTH;
  if (player.z >= currentLap * TRACK_LENGTH) {
    if (currentLap >= TOTAL_LAPS) {
      endRace();
      return;
    }
    currentLap++;
    const lapTime = gameTime - lapStartTime;
    if (lapTime < bestLap) bestLap = lapTime;
    lapStartTime = gameTime;
    updateLapDisplay();
  }

  // ---- Opponents ----
  opponents.forEach(opp => {
    const targetSpeed = opp.maxSpeed;
    opp.speed += (targetSpeed - opp.speed) * 0.02;

    // Slight weaving
    opp.x += Math.sin(opp.z * 0.001 + opp.id) * 0.001;
    opp.x = Math.max(-0.9, Math.min(0.9, opp.x));

    opp.z += opp.speed * dt * 60;
    if (opp.z > TRACK_LENGTH * TOTAL_LAPS) opp.z = 0;
  });

  // ---- Collision Detection ----
  if (collisionCooldown > 0) {
    collisionCooldown -= dt;
  } else {
    opponents.forEach(opp => {
      const dz = Math.abs(player.z - opp.z) % TRACK_LENGTH;
      const realDz = Math.min(dz, TRACK_LENGTH - dz);
      const dx = Math.abs(player.x - opp.x) * ROAD_WIDTH / 2;
      const carWidth = 400; // collision threshold in road units

      if (realDz < 200 && dx < carWidth) {
        // Collision!
        player.speed *= 0.5;
        opp.speed *= 0.7;
        const pushDir = player.x > opp.x ? 0.08 : -0.08;
        player.x += pushDir;
        opp.x -= pushDir * 0.5;
        collisionCooldown = 0.8;
        triggerCollisionFlash();
      }
    });
  }

  // ---- Update HUD ----
  document.getElementById('speedDisplay').textContent = Math.floor(player.speed);
  const elapsed = gameTime;
  document.getElementById('timeDisplay').textContent = formatTime(elapsed);
  updatePosition();
}

function triggerCollisionFlash() {
  const flash = document.getElementById('collisionFlash');
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 80);
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function updateLapDisplay() {
  document.getElementById('lapDisplay').textContent = `${Math.min(currentLap, TOTAL_LAPS)} / ${TOTAL_LAPS}`;
}

function updatePosition() {
  // Count opponents ahead
  const playerProgress = currentLap * TRACK_LENGTH + player.z;
  let position = 1;
  opponents.forEach(opp => {
    const oppProgress = opp.lap * TRACK_LENGTH + opp.z;
    if (oppProgress > playerProgress) position++;
  });
  const suffix = ['st','nd','rd','th'];
  const pos = Math.min(position, 4);
  document.getElementById('posDisplay').textContent = `P${pos}`;
}

// ============================================================
//  GAME FLOW
// ============================================================
function showScreen(id) {
  ['startScreen', 'hud', 'endScreen'].forEach(sid => {
    const el = document.getElementById(sid);
    if (sid === id) {
      el.classList.remove('hidden');
    } else {
      el.classList.add('hidden');
    }
  });
}

function startCountdown() {
  showScreen('');
  state = 'countdown';
  const countEl = document.getElementById('countdownNum');
  const countDiv = document.getElementById('countdown');

  let count = 3;
  function tick() {
    if (count === 0) {
      countEl.textContent = 'GO!';
      countEl.classList.add('count-pop');
      setTimeout(() => {
        countEl.classList.remove('count-pop');
        countDiv.style.display = 'none';
        state = 'racing';
        showScreen('hud');
        raceStartTime = performance.now();
        lapStartTime = 0;
        gameTime = 0;
      }, 900);
      return;
    }
    countEl.textContent = count;
    countEl.classList.remove('count-pop');
    void countEl.offsetWidth; // reflow
    countEl.classList.add('count-pop');
    count--;
    setTimeout(tick, 900);
  }
  countDiv.style.display = 'flex';
  tick();
}

function endRace() {
  state = 'end';
  player.speed = 0;

  document.getElementById('finalTime').textContent = formatTime(gameTime);
  const pos = parseInt(document.getElementById('posDisplay').textContent.replace('P',''));
  const posNames = ['', '1st', '2nd', '3rd', '4th'];
  document.getElementById('finalPos').textContent = posNames[pos] || '1st';
  document.getElementById('finalSpeed').textContent = Math.floor(topSpeed);

  const titles = ['Old Sport!', 'Splendid!', 'Magnificent!', 'Jolly Good!'];
  const eyebrows = ['Victory Lap', 'The Race Ends', 'Finish Line', 'Well Driven'];
  document.getElementById('endTitle').textContent = titles[Math.floor(Math.random() * titles.length)];
  document.getElementById('endEyebrow').textContent = eyebrows[Math.floor(Math.random() * eyebrows.length)];

  setTimeout(() => showScreen('endScreen'), 500);
}

function resetGame() {
  player.z = 0;
  player.x = 0;
  player.speed = 0;
  player.turning = 0;
  currentLap = 1;
  gameTime = 0;
  lapStartTime = 0;
  topSpeed = 0;
  collisionCooldown = 0;
  opponents = createOpponents();
  TRACK = buildTrack();
  updateLapDisplay();
  document.getElementById('countdown').style.display = 'flex';
  startCountdown();
}

// ---- Button Listeners ----
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startScreen').classList.add('hidden');
  resetGame();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('endScreen').classList.add('hidden');
  resetGame();
});

// ============================================================
//  MAIN LOOP
// ============================================================
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  render();

  if (state === 'racing') {
    renderMinimap();
    renderSpeedometer(player.speed, player.maxSpeed);
  }

  requestAnimationFrame(loop);
}

// Initial render for start screen atmosphere
function renderStartBG() {
  if (state === 'start') {
    render();
    requestAnimationFrame(renderStartBG);
  }
}

requestAnimationFrame(ts => {
  lastTime = ts;
  renderStartBG();
  requestAnimationFrame(loop);
});
</script>
